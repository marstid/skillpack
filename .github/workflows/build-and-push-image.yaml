# Build and publish the skillpack container image to ghcr.io on every merge to
# main. A merge of a PR into main produces a push to main, which is the trigger
# here — so this runs exactly once per merge, on the resulting commit.
#
# Auth uses the automatic GITHUB_TOKEN (no secret to configure). A repo-scoped
# token with packages:write permission is requested inline; it can push to
# ghcr.io/<owner>/<repo> for public repos out of the box. The image is also
# linked to the repository on ghcr.io by attaching the source repo URL label,
# which is already present in the Dockerfile.
#
# Tags produced on every run:
#   ghcr.io/marstid/skillpack:latest        (rolling)
#   ghcr.io/marstid/skillpack:sha-<8-char>    (immutable per commit)
#
# Also tags the image with a git tag (stripped of a leading 'v') when the merge
# commit carries one — so `git tag v0.1.0 && git push --tags` on main will also
# publish `ghcr.io/marstid/skillpack:0.1.0` from the same build.

name: build-and-push-image

on:
  push:
    branches: [main]

# Allow the job to push to ghcr.io under the repo's package namespace.
permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/marstid/skillpack

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build (go test)
        run: go test ./...

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -eu
          sha="$(git rev-parse --short=8 HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          taglist="$IMAGE:latest,$IMAGE:sha-$sha"
          # If the push carries a lightweight git tag like v0.1.0, also emit
          # a stripped semver image tag (e.g. 0.1.0).
          if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            ver="$(git describe --tags --exact-match HEAD | sed 's/^v//')"
            taglist="$taglist,$IMAGE:$ver"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
          fi
          echo "tags=$taglist" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.tags.outputs.sha }}
          # Cache the (Go) module download + build layers across runs using a
          # ghcr.io-scoped cache ref — ends up next to the image itself.
          cache-from: type=registry,ref=ghcr.io/marstid/skillpack:buildcache
          cache-to: type=registry,ref=ghcr.io/marstid/skillpack:buildcache,mode=max